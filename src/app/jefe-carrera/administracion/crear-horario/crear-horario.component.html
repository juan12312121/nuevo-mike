<div class="body-wrapper">
  <app-aside-jefecarrera></app-aside-jefecarrera>

  <main class="main-content-layout">
    <header class="header-premium">
      <h1>Crear Nuevo Horario</h1>
    </header>

    <div class="dashboard-container fade-in-premium">
      <!-- 1) TABS DE NAVEGACIÓN -->
      <div class="tabs-premium">
        <button
          class="tab-premium"
          [class.active]="currentTab === 'formato'"
          (click)="selectTab('formato')"
        >
          <i class="fa-solid fa-clock"></i>
          1. Formato
        </button>
        <button
          class="tab-premium"
          [class.active]="currentTab === 'dias'"
          (click)="selectTab('dias')"
        >
          <i class="fa-solid fa-calendar-week"></i>
          2. Días
        </button>
        <button
          class="tab-premium"
          [class.active]="currentTab === 'diseno'"
          (click)="selectTab('diseno')"
        >
          <i class="fa-solid fa-palette"></i>
          3. Diseño
        </button>
      </div>

      <!-- 2) TAB 1: FORMATO DEL HORARIO -->
      <div *ngIf="currentTab === 'formato'" class="tab-content-premium">
        <div class="grid-layout-premium">
          <!-- Izquierda: Controles -->
          <div class="config-column">
            <div class="card-premium">
              <h3 class="card-title-premium">
                <i class="fa-solid fa-sliders"></i>
                Configuración
              </h3>

              <div class="form-group-premium">
                <label class="form-label-premium">Turno del Horario</label>
                <div class="radio-group-premium">
                  <div *ngFor="let turno of turnos" class="radio-item-premium">
                    <input
                      type="radio"
                      [id]="'turno-' + turno"
                      name="turno"
                      [value]="turno"
                      [(ngModel)]="selectedTurno"
                      (change)="onTurnoChange()"
                    />
                    <label [for]="'turno-' + turno">{{ turno }}</label>
                  </div>
                </div>
              </div>

              <!-- Info turno -->
              <div *ngIf="selectedTurno !== 'Personalizado' && getInfoTurno() as info" class="info-card-premium">
                <div class="info-item-premium">
                  <i class="fa-solid fa-circle-info"></i>
                  <div>
                    <span class="info-label">Horario establecido</span>
                    <p class="info-value">{{ info.horario }}</p>
                  </div>
                </div>
              </div>

              <!-- Personalizado -->
              <div *ngIf="selectedTurno === 'Personalizado'" class="custom-range-premium">
                <div class="form-row-premium">
                  <div class="form-group-premium flex-1">
                    <label class="form-label-premium">Hora Inicio</label>
                    <input type="time" class="form-input-premium" [(ngModel)]="horaInicio" />
                  </div>
                  <div class="form-group-premium flex-1">
                    <label class="form-label-premium">Hora Fin</label>
                    <input type="time" class="form-input-premium" [(ngModel)]="horaFin" />
                  </div>
                </div>
                <div class="form-group-premium">
                  <label class="form-label-premium">Duración (minutos)</label>
                  <input type="number" class="form-input-premium" [(ngModel)]="minutosPorClase" min="50" max="60" />
                </div>
                <button class="btn-premium w-full justify-center" (click)="generateCustomSchedule()">
                  <i class="fa-solid fa-arrows-rotate"></i>
                  Generar Rangos
                </button>
              </div>

              <div class="divider-premium"></div>

              <div class="form-group-premium">
                <label class="form-label-premium" for="grupo_id">Grupo Asignado</label>
                <select id="grupo_id" class="form-select-premium" [(ngModel)]="grupoSeleccionado" name="grupoId">
                  <option [value]="null" disabled>Selecciona un grupo</option>
                  <option *ngFor="let grupo of grupos" [value]="grupo.id">
                    {{ grupo.nombre }} • {{ grupo.semestre }}° Semestre
                  </option>
                </select>
              </div>

              <div class="form-group-premium">
                <label class="form-label-premium" for="aula_id">Aula Principal</label>
                <select id="aula_id" class="form-select-premium" [(ngModel)]="aulaSeleccionada" name="aulaId">
                  <option [value]="null" disabled>Selecciona un aula</option>
                  <option *ngFor="let aula of aulas" [value]="aula.id">
                    Aula {{ aula.id }} — {{ aula.nombre }}
                  </option>
                </select>
              </div>
            </div>
          </div>

          <!-- Derecha: Vista Previa -->
          <div class="preview-column">
            <div class="card-premium h-full display-flex flex-direction-column">
              <h3 class="card-title-premium">
                <i class="fa-solid fa-eye"></i>
                Vista Previa de Horas
              </h3>
              
              <div class="table-wrapper-premium flex-1 overflow-auto">
                <table class="table-premium">
                  <thead>
                    <tr>
                      <th style="width: 80px">#</th>
                      <th>Inicio</th>
                      <th>Fin</th>
                      <th style="width: 120px">Duración</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr *ngFor="let h of horasGeneradas; let i = index">
                      <td class="font-bold text-primary">{{ i + 1 }}</td>
                      <td>{{ h.horaInicio }}</td>
                      <td>{{ h.horaFin }}</td>
                      <td>
                        <span class="badge-premium badge-blue">
                          {{ h.duracion }} min
                        </span>
                      </td>
                    </tr>
                    <tr *ngIf="horasGeneradas.length === 0">
                      <td colspan="4" class="text-center py-8 text-muted">
                        No hay horas generadas para este turno.
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

              <div class="mt-8 flex justify-end">
                <button class="btn-premium" (click)="nextTab()" [disabled]="horasGeneradas.length === 0">
                  Siguiente paso
                  <i class="fa-solid fa-arrow-right"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 3) TAB 2: SELECCIÓN DE DÍAS -->
      <app-tab2
        *ngIf="diasSemana.length && currentTab === 'dias'"
        [resumen]="resumen"
        [currentTab]="currentTab"
        [diasSeleccionados]="diasSeleccionados"
        (diasSeleccionadosChange)="onDiasSeleccionadosChange($event)"
        [diasSemana]="diasSemana"
        (tabChange)="selectTab($event)"
      ></app-tab2>

      <!-- 4) TAB 3: DISEÑO FINAL -->
      <app-tab3
        *ngIf="currentTab === 'diseno'"
        [resumen]="resumen"
        [diasSeleccionados]="diasSeleccionados"
        (tabChange)="selectTab($event)"
        [currentTab]="currentTab"
      ></app-tab3>
    </div>
  </main>
</div>
