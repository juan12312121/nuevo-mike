<div class="body-wrapper">
  <app-aside-jefecarrera></app-aside-jefecarrera>
  
  <div class="main-content-layout">
    <header class="header-premium">
      <h1>Panel de Control de Grupos</h1>
    </header>
    
    <main class="dashboard-container">
      <div class="section-header-premium">
        <h2 class="section-title-premium">Grupos Académicos ({{ filtered.length }})</h2>
        <button class="btn-premium" (click)="abrirModalNuevo()">
          <i class="fa-solid fa-plus"></i> Registrar Grupo
        </button>
      </div>
      
      <div class="search-wrapper-premium">
        <i class="fa-solid fa-magnifying-glass search-icon-premium"></i>
        <input
          type="text"
          class="search-input-premium"
          placeholder="Buscar grupo por nombre, carrera o semestre..."
          [(ngModel)]="terminoBusqueda"
          (input)="filtrarGrupos()"
        />
      </div>

      <div class="fade-in-premium">
        <div class="table-wrapper-premium">
          <table class="table-premium">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre del Grupo</th>
                <th>Carrera</th>
                <th>Ciclo / Semestre</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let grupo of gruposPaginados">
                <td><span class="badge-premium badge-blue">#{{ grupo.id }}</span></td>
                <td>
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar-small" style="background: #f0fdf4; color: #16a34a;"><i class="fa-solid fa-people-group"></i></div>
                    <span style="font-weight: 600;">{{ grupo.nombre }}</span>
                  </div>
                </td>
                <td>
                  <span class="badge-premium badge-purple">
                    <i class="fa-solid fa-graduation-cap"></i>
                    {{ grupo.carrera_nombre }}
                  </span>
                </td>
                <td><span class="badge-premium badge-amber">Semestre {{ grupo.semestre }}</span></td>
                <td>
                  <div class="action-buttons-premium">
                    <button class="btn-action btn-edit" (click)="editarGrupo(grupo)" title="Editar Grupo">
                      <i class="fa-solid fa-pen-to-square"></i>
                    </button>
                    <button class="btn-action btn-delete" (click)="eliminarGrupo(grupo.id)" title="Eliminar Grupo">
                      <i class="fa-solid fa-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="filtered.length === 0">
                <td colspan="5">
                  <div class="empty-state-premium">
                    <i class="fa-solid fa-users-slash empty-state-icon-premium"></i>
                    <p class="empty-state-text-premium">No se encontraron grupos que coincidan con la búsqueda.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top: 32px; display: flex; justify-content: center;">
          <app-paginacion
            *ngIf="mostrarPaginacion"
            [paginaActual]="paginaActual"
            [totalPaginas]="totalPaginas()"
            [maxPaginasVisibles]="5"
            (cambiarPagina)="onCambiarPagina($event)">
          </app-paginacion>
        </div>
      </div>
    </main>
  </div>

  <app-modal-grupos
    [isOpen]="modalOpen"
    (isOpenChange)="modalOpen = $event"
    [grupoSeleccionado]="grupoAEditar"
    (grupoActualizado)="onModalClose()"
  ></app-modal-grupos>
</div>
