<div class="body-wrapper">
  <app-aside-jefecarrera></app-aside-jefecarrera>
  
  <div class="main-content-layout">
    <header class="header-premium">
      <h1>Panel de Gestión Académica</h1>
    </header>
    
    <main class="dashboard-container">
      <!-- Content: Profesores -->
      <div class="fade-in-premium">
        <div class="section-header-premium">
          <h2 class="section-title-premium">Listado de Docentes ({{ profesoresFiltrados.length }})</h2>
          <button class="btn-premium" (click)="abrirModal()">
            <i class="fa-solid fa-plus"></i> Registrar Profesor
          </button>
        </div>
        
        <div class="search-wrapper-premium">
          <i class="fa-solid fa-magnifying-glass search-icon-premium"></i>
          <input
            type="text"
            class="search-input-premium"
            [(ngModel)]="terminoBusquedaProfesores"
            (input)="buscarProfesor($event)"
            placeholder="Buscar docente por nombre o correo..."
          />
        </div>
        
        <div class="table-wrapper-premium">
          <table class="table-premium">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre Completo</th>
                <th>Correo Electrónico</th>
                <th>Rol / Cargo</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let prof of profesoresPaginados; trackBy: trackById">
                <td><span class="badge-premium badge-blue">#{{ prof.id }}</span></td>
                <td>
                  <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="avatar-small" style="background: #f1f5f9; color: #3b82f6;"><i class="fa-solid fa-user-tie"></i></div>
                    <span style="font-weight: 600;">{{ prof.nombre }}</span>
                  </div>
                </td>
                <td>{{ prof.correo }}</td>
                <td><span class="badge-premium badge-purple">{{ prof.rol_nombre || 'Docente' }}</span></td>
                <td>
                  <div class="action-buttons-premium">
                    <button class="btn-action btn-edit" (click)="editarProfesor(prof)"><i class="fa-solid fa-pen-to-square"></i></button>
                    <button class="btn-action btn-delete" (click)="eliminarProfesor(prof.id)"><i class="fa-solid fa-trash"></i></button>
                  </div>
                </td>
              </tr>
              <tr *ngIf="profesoresFiltrados.length === 0">
                <td colspan="5">
                  <div class="empty-state-premium">
                    <i class="fa-solid fa-user-slash empty-state-icon-premium"></i>
                    <p class="empty-state-text-premium">No hay docentes registrados.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top: 32px; display: flex; justify-content: center;">
          <app-paginacion
            [paginaActual]="paginaActualProfesores"
            [totalPaginas]="totalPaginasProfesores()"
            [maxPaginasVisibles]="5"
            (cambiarPagina)="onCambiarPaginaProfesores($event)">
          </app-paginacion>
        </div>
      </div>
    </main>
  </div>
  
  <app-modalprofesores
    *ngIf="modalVisible"
    [modalVisible]="modalVisible"
    [profesorToEdit]="profesorToEdit"
    (cerrarModal)="cerrarModal()"
    (registroExitoso)="actualizarListaProfesor($event)"
  ></app-modalprofesores>
</div>
