<div id="dias" class="tab-content-premium fade-in-premium" *ngIf="currentTab === 'dias'">
  <div class="grid-layout-premium">
    <!-- Izquierda: Selección -->
    <div class="config-column">
      <div class="card-premium h-full">
        <h3 class="card-title-premium">
          <i class="fa-solid fa-calendar-check"></i>
          Días de Clase
        </h3>
        <p class="text-muted text-sm mb-8">Marca los días en los que el grupo tendrá actividades académicas.</p>
        
        <div class="days-grid-premium">
          <div *ngFor="let dia of diasSemana" class="day-item-premium">
            <input
              #chk
              type="checkbox"
              [id]="'dia-' + dia"
              [value]="dia"
              [checked]="diasSeleccionados.includes(dia)"
              (change)="onCheckboxChange(dia, chk.checked)"
              class="hidden-checkbox"
            />
            <label [for]="'dia-' + dia" class="day-pill-premium">
              <span class="checkbox-indicator">
                <i class="fa-solid fa-check"></i>
              </span>
              {{ dia }}
            </label>
          </div>
        </div>

        <div class="divider-premium"></div>

        <div class="resumen-mini-premium">
          <h4 class="text-xs font-bold text-muted uppercase tracking-wider mb-4">Detalles de Configuración</h4>
          <div class="resumen-grid-premium">
            <div class="resumen-stat">
              <span class="stat-label">Turno Seleccionado</span>
              <span class="stat-value badge-premium badge-blue">{{ resumen.turno }}</span>
            </div>
            <div class="resumen-stat">
              <span class="stat-label">Duración Clase</span>
              <span class="stat-value badge-premium badge-purple">{{ resumen.duracionClases }} min</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Derecha: Listado de seleccionados -->
    <div class="preview-column">
      <div class="card-premium h-full flex-column">
        <h3 class="card-title-premium">
          <i class="fa-solid fa-clipboard-list"></i>
          Días Seleccionados
        </h3>
        
        <div class="selected-days-container flex-1">
          <div *ngIf="diasSeleccionados.length > 0" class="selected-days-grid">
            <div *ngFor="let d of diasSeleccionados" class="selected-day-mini-card">
              <div class="day-dot"></div>
              <span class="day-label">{{ d }}</span>
              <span class="status-indicator">Activo</span>
            </div>
          </div>

          <div class="centered-empty-state" *ngIf="diasSeleccionados.length === 0">
            <div class="empty-icon-wrapper">
              <i class="fa-solid fa-calendar-xmark"></i>
            </div>
            <p>Selecciona al menos un día de clase</p>
          </div>
        </div>

        <div class="premium-actions-footer mt-8">
          <button type="button" class="btn-prev-premium" (click)="navegarTab('anterior')">
            <i class="fa-solid fa-arrow-left"></i>
            Anterior
          </button>
          <button type="button" class="btn-next-premium" (click)="navegarTab('siguiente')" [disabled]="diasSeleccionados.length === 0">
            Generar Tablero
            <i class="fa-solid fa-table-cells"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
